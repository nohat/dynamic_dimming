default_config:

logger:
  default: warning
  logs:
    custom_components.dynamic_dimming: debug

input_number:
  dev_lamp_brightness:
    name: Dev Lamp Brightness
    min: 0
    max: 255
    step: 1

light:
  - platform: template
    lights:
      dev_lamp:
        friendly_name: Dev Lamp
        level_template: "{{ states('input_number.dev_lamp_brightness') | int(0) }}"
        value_template: "{{ states('input_number.dev_lamp_brightness') | int(0) > 0 }}"
        set_level:
          - service: input_number.set_value
            target: { entity_id: input_number.dev_lamp_brightness }
            data: { value: "{{ brightness }}" }
        turn_on:
          - service: input_number.set_value
            target: { entity_id: input_number.dev_lamp_brightness }
            data: { value: 255 }
        turn_off:
          - service: input_number.set_value
            target: { entity_id: input_number.dev_lamp_brightness }
            data: { value: 0 }
