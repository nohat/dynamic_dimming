name: Device report
description: Report what happened when you tried dynamic_dimming on one of your lights.
title: "[device] "
labels: ["device-report"]
body:
  - type: markdown
    attributes:
      value: |
        <img src="https://raw.githubusercontent.com/nohat/dynamic_dimming/main/brand/icon.png" width="76" align="right" alt="">

        This integration has been tested on very little hardware so far. A report of
        what happened on yours — whether it worked well, worked poorly, or did not
        work at all — is the most useful contribution you can make right now.
        Thank you for taking the time.
  - type: dropdown
    id: integration
    attributes:
      label: How is the light connected?
      options:
        - ZHA
        - Zigbee2MQTT
        - Z-Wave JS
        - ESPHome
        - Tasmota
        - Matter
        - Wi-Fi / cloud (Hue, LIFX, Tuya, …)
        - Other
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Light make & model
      description: The exact model number, if you can find it — it is usually on the device label.
      placeholder: "e.g. Martin Jerry MJ-SD01, IKEA TRÅDFRI LED1732G11"
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - "Worked well — smooth continuous dimming"
        - "Worked, with problems (visible stepping, lag, or network flooding)"
        - "Did not work"
    validations:
      required: true
  - type: checkboxes
    id: tried
    attributes:
      label: What you tried
      options:
        - label: move up
        - label: move down (did it stop at the lowest on-level rather than turning off?)
        - label: stop (did the light hold its level?)
        - label: step
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.7.2"
  - type: textarea
    id: details
    attributes:
      label: What you observed
      description: "Anything notable: smoothness, latency between release and stop, whether the level held, mesh or network behavior, relevant log lines."
    validations:
      required: false
